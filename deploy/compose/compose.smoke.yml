# Standalone stack for scripts/compose-smoke.sh (simulated worker, no GPU).
# Uses an alternate host port so it does not collide with a dev API on :8080.
services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    ports:
      - "${COMPOSE_SMOKE_PORT:-18080}:8080"
    environment:
      AUTH_MODE: none
      DATABASE_URL: postgresql://potocolom:${POSTGRES_PASSWORD}@postgres/potocolom
      STORAGE_BACKEND: local
      PUBLIC_URL: http://localhost:${COMPOSE_SMOKE_PORT:-18080}
      INTERNAL_URL: http://api:8080
    volumes:
      - assets:/data/assets
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: potocolom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: potocolom
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U potocolom"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker-sim:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker-sim
    environment:
      API_URL: ws://api:8080/api/v1/fleet
    depends_on:
      - api

volumes:
  pgdata:
  assets:
