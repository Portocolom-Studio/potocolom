# Self-hosted stack: one API (SPA + backend), PostgreSQL and one GPU worker.
# Shape matches docs/blueprint.md; no Redis, billing or safety services.
services:
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      AUTH_MODE: none
      DATABASE_URL: postgresql://potocolom:${POSTGRES_PASSWORD}@postgres/potocolom
      STORAGE_BACKEND: local
      PUBLIC_URL: http://localhost:8080
      INTERNAL_URL: http://api:8080
    volumes:
      - assets:/data/assets
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: potocolom
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: potocolom
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U potocolom"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    profiles: ["gpu"]
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker-cuda
    environment:
      DEVICE: cuda
      API_URL: ws://api:8080/api/v1/fleet
      MODELS_DIR: /models
    volumes:
      - models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      - api

  # Simulated worker for smoke tests (docker compose --profile smoke).
  worker-sim:
    profiles: ["smoke"]
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker-sim
    environment:
      API_URL: ws://api:8080/api/v1/fleet
    depends_on:
      - api

volumes:
  pgdata:
  assets:
  models:
