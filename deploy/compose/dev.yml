# Development dependencies only. The API server, frontend dev server and worker
# run natively for hot reload and debugger access (docs/local-development.md).
# The full self-hosted stack ships with issue #18.
services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: potocolom
      POSTGRES_PASSWORD: potocolom
      POSTGRES_DB: potocolom
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # Host ports are offset from the defaults (9000, 9001, 1025, 8025) because
  # development machines often run other services on them.
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9100:9000" # S3 API
      - "9101:9001" # web console
    environment:
      MINIO_ROOT_USER: potocolom
      MINIO_ROOT_PASSWORD: potocolom
    volumes:
      - miniodata:/data

  mailpit:
    image: axllent/mailpit
    ports:
      - "1125:1025" # SMTP
      - "8125:8025" # web UI

volumes:
  pgdata:
  miniodata:
