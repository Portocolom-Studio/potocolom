# One workflow per component, triggered only when its files change (issue #13).
# scripts/ is included because the backend job lints it (see the Makefile).
name: backend

on:
  pull_request:
    paths:
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  backend:
    # Self-hosted on the reference desktop when GitHub-hosted minutes are exhausted.
    # Switch back to ubuntu-latest when hosted quota is available (docs/self-hosted-runner.md).
    runs-on: [self-hosted, Linux, X64, potocolom]
    env:
      # 15432 avoids clashing with deploy/compose/dev.yml postgres on :5432.
      DATABASE_URL: postgresql://potocolom:potocolom@localhost:15432/potocolom_test
    defaults:
      run:
        working-directory: backend
    services:
      # The db-marked tests run against this; without it they self-skip.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: potocolom
          POSTGRES_PASSWORD: potocolom
          POSTGRES_DB: potocolom
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U potocolom"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - run: python3.11 -m venv .venv
      - run: .venv/bin/pip install -e ".[dev]"
      - run: .venv/bin/ruff check . ../scripts
      - run: .venv/bin/mypy
      - run: .venv/bin/pytest
