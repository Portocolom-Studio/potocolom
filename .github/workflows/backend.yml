# One workflow per component, triggered only when its files change (issue #13).
# scripts/ is included because the backend job lints it (see the Makefile).
name: backend

on:
  pull_request:
    paths:
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/backend.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "scripts/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install -e ".[dev]"
      - run: ruff check . ../scripts
      - run: mypy
      - run: pytest
