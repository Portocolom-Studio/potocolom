# One workflow per component, triggered only when its files change (issue #13).
name: worker

on:
  pull_request:
    paths:
      - "worker/**"
      - ".github/workflows/worker.yml"
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker.yml"

permissions:
  contents: read

jobs:
  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker/pyproject.toml
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy
      - run: pytest
