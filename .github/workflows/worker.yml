# One workflow per component, triggered only when its files change (issue #13).
name: worker

on:
  pull_request:
    paths:
      - "worker/**"
      - ".github/workflows/worker.yml"
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker.yml"

permissions:
  contents: read

jobs:
  worker:
    # Self-hosted: docs/self-hosted-runner.md (venv avoids Debian PEP 668).
    runs-on: [self-hosted, Linux, X64, potocolom]
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v7
      - run: python3.11 -m venv .venv
      - run: .venv/bin/pip install -e ".[dev]"
      - run: .venv/bin/ruff check .
      - run: .venv/bin/mypy
      - run: .venv/bin/pytest
