# The one test that exercises the whole stack over real TCP: API and two
# workers as subprocesses, a simulated browser, a worker killed mid session.
# Triggered by changes to anything it spans.
name: simulation

on:
  pull_request:
    paths:
      - "backend/**"
      - "worker/**"
      - "scripts/**"
      - ".github/workflows/simulation.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "worker/**"
      - "scripts/**"
      - ".github/workflows/simulation.yml"

permissions:
  contents: read

jobs:
  simulation:
    # Self-hosted: docs/self-hosted-runner.md
    runs-on: [self-hosted, Linux, X64, potocolom]
    steps:
      - uses: actions/checkout@v7
      - run: python3.11 -m pip install -e ./backend -e ./worker
      - run: python3.11 scripts/simulate.py
        timeout-minutes: 3
