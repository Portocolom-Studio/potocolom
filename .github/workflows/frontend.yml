# One workflow per component, triggered only when its files change (issue #13).
name: frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  frontend:
    # Self-hosted: docs/self-hosted-runner.md (system node 24, not setup-node).
    runs-on: [self-hosted, Linux, X64, potocolom]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run build
