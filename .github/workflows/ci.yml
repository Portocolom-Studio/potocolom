# Stage 1 of the pipeline in docs/local-development.md: lint and unit tests per
# component on every pull request. Later stages (tiny model worker integration,
# service containers, image builds, cloud-sim smoke) arrive with their issues.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check . ../scripts
      - run: mypy
      - run: pytest

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy
      - run: pytest

  # The one test that exercises the whole stack over real TCP: API and two
  # workers as subprocesses, a simulated browser, a worker killed mid session.
  simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            worker/pyproject.toml
      - run: pip install -e ./backend -e ./worker
      - run: python scripts/simulate.py
        timeout-minutes: 3
