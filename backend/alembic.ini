# Alembic configuration. The database URL is never read from this file: env.py
# takes it from DATABASE_URL via app.settings, and startup migration overrides
# sqlalchemy.url programmatically (app/db.py).
[alembic]
script_location = %(here)s/migrations
prepend_sys_path = %(here)s
path_separator = os

[loggers]
keys = root

[handlers]
keys = console

[formatters]
keys = plain

[logger_root]
level = WARNING
handlers = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = plain

[formatter_plain]
format = %(levelname)s [%(name)s] %(message)s
